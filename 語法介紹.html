<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>語法介紹</title>
</head>
<body>
    <h1> 給瀏覽器看的 </h1>
    【head】<br>
    【!DOCTYPE html】<br>
    【html lang="zh-tw"】"裡面的字代表你的網域在哪裡"<br>
    【head】<br>
    【meta charset="UTF-8"】<br>
    【meta name="viewport" content="width=device-width, initial-scale=1.0"】<br>
    【title】Document【/title】<br>
    【/head】<br>
    要寫網頁的時候要把【】變成 <><br>
    <mark>寫得越好，分數越高，越容易被人家看到。</mark>
</body>
</html>
