<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>特殊符號</title>
</head>
<body>
    <strong>上標 下標</strong><br>
    X<sup>2</sup><br>
    H<sub>2</sub>O<br>
    加底線就會尷尬變怪怪的，會出問題所以幾乎都不加底線<br>
    HTML 特殊符號大全：❤ 符號代碼也不需要加左括右括<br>
    【&+L+T+; &nbsp; &+G+T+;】左刮鬍跟右括弧的代碼(不用加左括右括)<br>
    &LT;❤&GT;
</body>
</html>
