<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表單</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
</head>
<body>
    <h2>表單</h2>
    <form action="#" method="get">
        <input type="text" name="user" placeholder="請輸入使用者帳號" required><br>
        <input type="password" name="pass" id="pass" placeholder="請輸入使用者密碼">
        <button type="button" id="btn"><i class="fa-solid fa-eye" id="eye"></i></button><br>
        <label for="boy">
            <input type="radio" name="sexy" id="" value="男" checked>
            男
        </label>
        <label for="girl">
            <input type="radio" name="sexy" id="" value="女">
            女
        </label>
        <br>
        <label for="red">
             <input type="checkbox" name="color" id="red" value="red" checked>
            紅色
        </label>
        <label for="green">
        <input type="checkbox" name="color" id="green" value="green">
            綠色
        </label>
        <label for="blue">
        <input type="checkbox" name="color" id="blue" value="blue">
            藍色
        </label>
        <button type="submit">送出</button>
    </form>
</body>
</html>
<script>
    let btn= document.getElementById("btn");
    let pass= document.getElementById("pass");
    let eye = document.getElementById("eye");
    btn.addEventListener("click", function(){
        if(pass.getAttribute("type")=="password"){
            pass.setAttribute("type","text");
            eye.setAttribute("class","fa-solid fa-eye-slash");
        }else{
            pass.setAttribute("type","password");
            eye.setAttribute("class","fa-solid fa-eye");
        }
    })
</script>
