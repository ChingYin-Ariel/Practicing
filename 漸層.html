<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漸層</title>
    <style>
        /*https://cssgradient.io/ 可以到這個網頁確定她嘟位置 (百分比)*/
        body{
            width:100%;
            height:99vh;
            /*直向*/
            background-image: linear-gradient(rgba(255, 77, 77, 1) 0%, rgba(255, 192, 203, 1) 41%, rgba(255, 192, 203, 1) 53%, rgba(241, 133, 255, 1) 85%, rgba(248, 140, 58, 0.89) 100%);
            /*橫向
            background-image: linear-gradient(90deg, rgba(255, 77, 77, 1) 0%, rgba(255, 192, 203, 1) 41%, rgba(255, 192, 203, 1) 53%, rgba(241, 133, 255, 1) 85%, rgba(248, 140, 58, 0.89) 100%);*/
            /*由中心向外擴散
            background-image: radial-gradient(circle,rgba(255, 77, 77, 1) 0%, rgba(255, 192, 203, 1) 41%, rgba(255, 192, 203, 1) 53%, rgba(241, 133, 255, 1) 85%, rgba(248, 140, 58, 0.89) 100%);


            /*線性放射*/
        }
    </style>
</head>
<body>
    
</body>
</html>
