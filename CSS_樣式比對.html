<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS_樣式比對</title>
    <style>
    .fw100{
            font-weight: 100;
        }
        .fw200{
            font-weight: 200;
        }
        .fw300{
            font-weight: 300;
        }
        .fw400{
            font-weight: 400;
        }
        .fw500{
            font-weight: 500;
        }
        .fw600{
            font-weight: 600;
        }
        .fw700{
            font-weight: 700;
        }
        .fw800{
            font-weight: 800;
        }
        .fw900{
            font-weight: 900;
        }
    </style>
</head>
<body>
    <!--字體寬度只有整數 1~900 -->
    <p class="fw100">1面議多個笑話天下什麼事數碼，公里一段時。</p>
    <p class="fw200">2面議多個笑話天下什麼事數碼，公里一段時。</p>
    <p class="fw300">3面議多個笑話天下什麼事數碼，公里一段時。</p>
    <p class="fw400">4面議多個笑話天下什麼事數碼，公里一段時。</p>
    <p class="fw500">5面議多個笑話天下什麼事數碼，公里一段時。</p>
    <p class="fw600">6面議多個笑話天下什麼事數碼，公里一段時。</p>
    <p class="fw700">7面議多個笑話天下什麼事數碼，公里一段時。</p>
    <p class="fw800">8面議多個笑話天下什麼事數碼，公里一段時。</p>
    <p class="fw900">9面議多個笑話天下什麼事數碼，公里一段時。</p>
</body>
</html>
