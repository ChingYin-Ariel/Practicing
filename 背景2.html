<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>背景2</title>
    <style>
        body{
            width: 500%;
            height: 100vh;
            background-image: url(https://pgw.udn.com.tw/gw/photo.php?u=https://uc.udn.com.tw/photo/2025/10/08/realtime/33308832.jpg&x=0&y=0&sw=0&sh=0&exp=3600&nt=1&w=930) ;/*
            /* 插入圖片、線性漸層、放性漸層 
            background-repeat: repeat;
            /*重複圖片，不會受框架引響??
            background-repeat: repeat-x;
            background-repeat: repeat-y;
            background-repeat: no-repeat;*/
            background-size: cover;
            /*填滿畫面，等比例放大，不設定寬高也沒關係
            (依照視窗大小填滿)
            background-size: contain;
            /* 填滿框架，等比例放大填滿，(要設定框架大小) (依照物件大小填滿)
            background-size: auto;
            /*原本的圖片大小，不會依照設定的框架放大或縮小
            background-size: 50%;
            /*依照寬度做%*/
            background-position: center right;


        }
    </style>
</head>
